<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strain – PhenoBrasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
  --border: #2a2a2a; --gold: #c9a84c; --gold2: #e8c96a;
  --green: #3a7d44; --green2: #4caf50; --white: #f0ede8; --muted: #888; --red: #e05252;
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

/* NAV */
nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Barlow Condensed'; font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; cursor: pointer; text-decoration: none; color: var(--white); }
.nav-logo span { color: var(--gold); }
.nav-back { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 0.45rem 1rem; font-family: 'Barlow Condensed'; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 2px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.2s; }
.nav-back:hover { border-color: var(--gold); color: var(--gold); }

/* HERO DA STRAIN */
.strain-hero {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 520px; max-width: 1200px; margin: 0 auto;
}
@media (max-width: 768px) { .strain-hero { grid-template-columns: 1fr; } }

.strain-img-wrap { position: relative; overflow: hidden; }
.strain-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 360px; }
.strain-img-overlay { position: absolute; inset: 0; background: linear-gradient(to right, transparent 60%, var(--bg) 100%); pointer-events: none; }
@media (max-width: 768px) { .strain-img-overlay { background: linear-gradient(to bottom, transparent 60%, var(--bg) 100%); } }

.strain-hero-info {
  padding: 3rem 2.5rem;
  display: flex; flex-direction: column; justify-content: center;
}
.strain-type-badge {
  display: inline-block; background: var(--green); color: #fff;
  font-family: 'Barlow Condensed'; font-size: 0.75rem; font-weight: 700;
  padding: 0.2rem 0.7rem; text-transform: uppercase; border-radius: 2px;
  margin-bottom: 1rem; width: fit-content;
}
.strain-name {
  font-family: 'Barlow Condensed'; font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 800; text-transform: uppercase; line-height: 0.95;
  margin-bottom: 0.5rem; letter-spacing: -0.01em;
}
.strain-genetics {
  color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.strain-genetics strong { color: var(--white); }

.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin-bottom: 2rem; }
.stat-box {
  background: var(--bg3); border: 1px solid var(--border);
  padding: 0.8rem 1rem; border-radius: 2px;
}
.stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
.stat-value { font-family: 'Barlow Condensed'; font-size: 1.15rem; font-weight: 700; color: var(--white); }
.stat-value.gold { color: var(--gold); }

.strain-price {
  font-family: 'Barlow Condensed'; font-size: 2rem;
  font-weight: 800; color: var(--gold); margin-bottom: 1rem;
}
.cart-btn {
  background: var(--green); color: #fff; border: none;
  padding: 1rem 2rem; font-family: 'Barlow Condensed'; font-size: 1.1rem;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 2px; transition: all 0.2s;
  width: 100%; max-width: 320px;
}
.cart-btn:hover { background: var(--green2); }
.cart-btn.added { background: var(--gold); color: #000; }

/* CORPO DA PÁGINA */
.strain-body { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
@media (max-width: 768px) { .strain-body { grid-template-columns: 1fr; } }

.section-title {
  font-family: 'Barlow Condensed'; font-size: 1.1rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold);
  margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}

.descricao-text { color: #ccc; line-height: 1.75; font-size: 0.95rem; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.tag-pill {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--white); padding: 0.3rem 0.9rem; border-radius: 20px;
  font-size: 0.82rem; font-weight: 500;
}

.sidebar-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 1.5rem; border-radius: 4px; border-top: 3px solid var(--gold);
  margin-bottom: 1.5rem; height: fit-content;
}

.breeder-card { display: flex; align-items: center; gap: 1rem; }
.breeder-avatar {
  width: 50px; height: 50px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--gold);
  background: var(--bg3); flex-shrink: 0;
}
.breeder-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
.breeder-label { font-size: 0.75rem; color: var(--muted); }

.prod-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.prod-row:last-child { border-bottom: none; }
.prod-row-label { color: var(--muted); }
.prod-row-value { font-weight: 600; font-family: 'Barlow Condensed'; font-size: 1rem; }

/* TOAST */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg3); border: 1px solid var(--gold); color: var(--white); padding: 0.7rem 1.4rem; border-radius: 4px; font-family: 'Barlow Condensed'; font-size: 0.95rem; font-weight: 700; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#loading-state, #error-state { max-width: 600px; margin: 6rem auto; text-align: center; padding: 2rem; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="vitrine 2.0.html">PHENO<span>BRASIL</span></a>
  <a class="nav-back" href="vitrine 2.0.html">← Voltar à Vitrine</a>
</nav>

<div id="loading-state"><p>Carregando strain...</p></div>
<div id="error-state" style="display:none"><p style="color:var(--red)">Strain não encontrada.</p></div>

<div id="strain-content" style="display:none">
  <!-- HERO -->
  <div class="strain-hero">
    <div class="strain-img-wrap">
      <img id="s-img" src="" alt="">
      <div class="strain-img-overlay"></div>
    </div>
    <div class="strain-hero-info">
      <span class="strain-type-badge" id="s-type"></span>
      <h1 class="strain-name" id="s-name"></h1>
      <div class="strain-genetics" id="s-genetics"></div>
      <div class="stat-grid" id="s-stats"></div>
      <div class="strain-price" id="s-price"></div>
      <button class="cart-btn" id="btn-cart" onclick="window.adicionarCarrinho()">+ Adicionar ao Carrinho</button>
    </div>
  </div>

  <!-- CORPO -->
  <div class="strain-body">
    <div>
      <div id="s-desc-section" style="margin-bottom:2.5rem; display:none">
        <div class="section-title">Descrição</div>
        <p class="descricao-text" id="s-desc"></p>
      </div>
      <div id="s-efeitos-section" style="margin-bottom:2.5rem; display:none">
        <div class="section-title">Efeitos</div>
        <div class="tags-wrap" id="s-efeitos"></div>
      </div>
      <div id="s-aromas-section" style="display:none">
        <div class="section-title">Aromas & Sabores</div>
        <div class="tags-wrap" id="s-aromas"></div>
      </div>
    </div>

    <div>
      <div class="sidebar-card" id="s-breeder-card">
        <div class="section-title">Breeder</div>
        <div class="breeder-card">
          <img class="breeder-avatar" id="s-breeder-foto" src="" alt="">
          <div>
            <div class="breeder-name" id="s-breeder-nome"></div>
            <div class="breeder-label">Breeder Verificado</div>
          </div>
        </div>
      </div>

      <div class="sidebar-card" id="s-prod-card" style="display:none">
        <div class="section-title">Produção Estimada</div>
        <div id="s-producao"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJTlL-4piG67VOM_y480dhyib2qaF3Bso",
    authDomain: "phenobrasil.firebaseapp.com",
    projectId: "phenobrasil",
    storageBucket: "phenobrasil.firebasestorage.app",
    messagingSenderId: "825755980394",
    appId: "1:825755980394:web:caad888821d128fb133013"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const params  = new URLSearchParams(window.location.search);
  const strainId = params.get('id');
  let produtoAtual = null;

  const mostrarToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  };

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

  const carregarStrain = async () => {
    if (!strainId) { showError(); return; }
    try {
      const snap = await getDoc(doc(db, "products", strainId));
      if (!snap.exists()) { showError(); return; }

      const p = snap.data();
      produtoAtual = { id: snap.id, ...p };
      document.title = `${p.name} – PhenoBrasil`;

      // Imagem
      const img = document.getElementById('s-img');
      img.src = p.image || 'https://via.placeholder.com/600x520';
      img.alt = p.name;

      // Básicos
      set('s-type', p.type || '');
      set('s-name', p.name || '');
      set('s-price', p.price ? 'R$ ' + p.price.toFixed(2).replace('.', ',') : '');

      // Genética
      const genEl = document.getElementById('s-genetics');
      if (p.pai || p.mae) {
        genEl.innerHTML = `<strong>♂ ${p.pai || '?'}</strong> <span style="color:var(--gold)">×</span> <strong>♀ ${p.mae || '?'}</strong>`;
      } else { genEl.style.display = 'none'; }

      // Stats
      const statsEl = document.getElementById('s-stats');
      const stats = [
        { label: 'Floração', value: p.flow },
        { label: 'THC', value: p.thc, gold: true },
        { label: 'CBD', value: p.cbd },
        { label: 'Tipo', value: p.type },
      ].filter(s => s.value);
      statsEl.innerHTML = stats.map(s => `
        <div class="stat-box">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value${s.gold ? ' gold' : ''}">${s.value}</div>
        </div>`).join('');

      // Descrição
      if (p.descricao) {
        document.getElementById('s-desc').textContent = p.descricao;
        document.getElementById('s-desc-section').style.display = 'block';
      }

      // Efeitos
      if (p.efeitos && p.efeitos.length) {
        document.getElementById('s-efeitos').innerHTML = p.efeitos.map(e => `<span class="tag-pill">✨ ${e}</span>`).join('');
        document.getElementById('s-efeitos-section').style.display = 'block';
      }

      // Aromas
      if (p.aromas && p.aromas.length) {
        document.getElementById('s-aromas').innerHTML = p.aromas.map(a => `<span class="tag-pill">🍋 ${a}</span>`).join('');
        document.getElementById('s-aromas-section').style.display = 'block';
      }

      // Produção
      if (p.indoor || p.outdoor) {
        const rows = [];
        if (p.indoor)  rows.push(`<div class="prod-row"><span class="prod-row-label">🏠 Indoor</span><span class="prod-row-value">${p.indoor}</span></div>`);
        if (p.outdoor) rows.push(`<div class="prod-row"><span class="prod-row-label">🌿 Outdoor</span><span class="prod-row-value">${p.outdoor}</span></div>`);
        document.getElementById('s-producao').innerHTML = rows.join('');
        document.getElementById('s-prod-card').style.display = 'block';
      }

      // Breeder
      if (p.breederUid) {
        try {
          const uSnap = await getDoc(doc(db, "users", p.breederUid));
          if (uSnap.exists()) {
            const u = uSnap.data();
            set('s-breeder-nome', u.name || p.breederEmail || 'Breeder');
            const fotoEl = document.getElementById('s-breeder-foto');
            fotoEl.src = u.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.name || 'B')}&background=3a7d44&color=fff`;
          }
        } catch (_) { set('s-breeder-nome', p.breederEmail || 'Breeder'); }
      }

      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('strain-content').style.display = 'block';
    } catch (err) {
      console.error(err); showError();
    }
  };

  const showError = () => {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display   = 'block';
  };

  // ── CARRINHO ─────────────────────────────────────────────
  window.adicionarCarrinho = () => {
    if (!produtoAtual) return;
    const carrinho = JSON.parse(localStorage.getItem('pheno_cart') || '[]');
    const idx = carrinho.findIndex(i => i.id === produtoAtual.id);
    if (idx > -1) {
      carrinho[idx].qty++;
      mostrarToast(`+1 ${produtoAtual.name} no carrinho`);
    } else {
      carrinho.push({ id: produtoAtual.id, name: produtoAtual.name, type: produtoAtual.type, price: produtoAtual.price, image: produtoAtual.image, qty: 1 });
      mostrarToast(`✅ ${produtoAtual.name} adicionado!`);
    }
    localStorage.setItem('pheno_cart', JSON.stringify(carrinho));
    const btn = document.getElementById('btn-cart');
    btn.textContent = '✓ No Carrinho'; btn.classList.add('added');
    setTimeout(() => { btn.textContent = '+ Adicionar ao Carrinho'; btn.classList.remove('added'); }, 1800);
  };

  carregarStrain();
</script>
</body>
</html>
